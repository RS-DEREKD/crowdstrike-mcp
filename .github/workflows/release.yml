name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Check linting
        run: ruff check src/ tests/
      - name: Check formatting
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Run tests
        run: pytest tests/ -v --tb=short

  release:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify SERVER_VERSION matches tag
        run: |
          code_version=$(python3 -c "import ast; tree = ast.parse(open('src/crowdstrike_mcp/__init__.py').read()); print([n.value.value for n in ast.walk(tree) if isinstance(n, ast.Assign) and any(t.id == '__version__' for t in n.targets if isinstance(t, ast.Name))][0])")
          tag_version="${{ steps.version.outputs.version }}"
          if [ "$code_version" != "$tag_version" ]; then
            echo "::error::Version mismatch: __init__.py has '$code_version' but tag is 'v$tag_version'"
            echo "Update __version__ in src/crowdstrike_mcp/__init__.py to '$tag_version' before tagging."
            exit 1
          fi
          echo "Version check passed: $tag_version"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
